# This workflow will build a Java project with Maven
# For more information see: https://help.github.com/actions/language-and-framework-guides/building-and-testing-java-with-maven

name: Backend DEV (Java/maven)

env:
  AWS_REGION: "eu-west-1"
  # If AWS account/project changes this should too
  DOCKER_REPO: 211318693510.dkr.ecr.eu-west-1.amazonaws.com/ctl/calendar-import
  EB_APPLICATION: calendar-import
  EB_ENVIRONMENT: calendar-import-dev-env
  CANVAS_HOST: https://universityofoxford.beta.instructure.com
  OAUTH_TOKEN: ${{ secrets.OAUTH_TOKEN }}
  COURSE_ID: 186641
  TOOL_ID: 55607

on:
  push:
    branches: [ master ]
    tags: [ '*' ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend*'
      - '!backend/README.md'



jobs:
  build:
    runs-on: ubuntu-20.04
    timeout-minutes: 10
    outputs:
      tag: ${{ steps.output-tag.outputs.tag }}
      message: ${{ steps.output-message.outputs.message }}
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: 17
          distribution: 'temurin'
          cache: 'maven'
      - name: Build with Maven
        run: mvn -B package --file pom.xml
      - name: Set docker tag
        # We need a prefix on the tag so that we don't overwrite the shippable tags
        # This only works on branches.
        run: echo "DOCKER_TAG=calendar-import.${GITHUB_REF##*/}.${GITHUB_RUN_NUMBER}" >> $GITHUB_ENV
      - name: Set docker tag for git tag
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        # We don't want the run number in the tag.
        run: echo "DOCKER_TAG=calendar-import.${GITHUB_REF##*/}" >> $GITHUB_ENV
      - name: Login to Amazon ECR
        id: login-ecr
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.PROD_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.PROD_AWS_SECRET_ACCESS_KEY }}
        uses: aws-actions/amazon-ecr-login@v1
      - name: Push to docker repository (ECR)
        id: push
        # We set the commit ID on the command line rather than using the plugin.
        run: mvn -B -Dimage=${DOCKER_REPO} -Djib.tag=${DOCKER_TAG} -Dgit.commit.id=${GITHUB_SHA} jib:build
      - name: Set image tag output
        id: output-tag
        run: echo tag="${DOCKER_TAG}" >> $GITHUB_OUTPUT
      - name: Set message output
        id: output-message
        run: echo message="$(git log --format=%s -n 1 ${GITHUB_SHA})" >> $GITHUB_OUTPUT
      - name: Upload Elastic Beanstalk Artifact
        uses: actions/upload-artifact@v3
        with:
          name: elasticbeanstalk
          path: backend/elasticbeanstalk
          retention-days: 1

  deploy-dev:
    timeout-minutes: 10
    runs-on: ubuntu-20.04
    needs: build
    concurrency: dev
    env:
      TAG: ${{ needs.build.outputs.tag }}
      MESSAGE: ${{ needs.build.outputs.message }}
      PORT: 8080
    steps:
      - name: Download a Elastic Beanstalk artifact
        uses: actions/download-artifact@v3
        with:
          name: elasticbeanstalk
      - name: Start deployment
        uses: bobheadxi/deployments@v1.4.0
        id: deployment
        with:
          step: start
          env: backend-dev
      - name: Replace the image in the files
        env:
          IMAGE: ${{ env.DOCKER_REPO }}:${{ needs.build.outputs.tag }}
        run: envsubst < Dockerrun-template.aws.json > Dockerrun.aws.json
      - name: Generate deployment package
        run: zip -r deploy.zip . -x '*.git*'
      - name: Deploy to EB
        uses: einaregilsson/beanstalk-deploy@v21
        timeout-minutes: 5
        with:
          aws_access_key: ${{ secrets.PROD_AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.PROD_AWS_SECRET_ACCESS_KEY }}
          application_name: ${{ env.EB_APPLICATION }}
          environment_name: ${{ env.EB_ENVIRONMENT }}
          version_label: ${{ env.TAG }}
          version_description: ${{ env.MESSAGE }}
          region: ${{ env.AWS_REGION }}
          deployment_package: deploy.zip
      - name: Update deployment status
        uses: bobheadxi/deployments@v1.4.0
        if: always()
        with:
          step: finish
          env: backend-dev
          status: ${{ job.status }}
          deployment_id: ${{ steps.deployment.outputs.deployment_id }}

  deployment-tests:
    runs-on: ubuntu-20.04
    timeout-minutes: 5
    needs: deploy-dev
    env:
      OAUTH_TOKEN: ${{ secrets.DEPLOYMENT_TESTS_OAUTH_TOKEN }}
    defaults:
      run:
        working-directory: deployment
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'
      - run: npm ci
      - run: npm run install-browsers
      - run: npm test

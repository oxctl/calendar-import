# This waits for the backend to be available and then performs the deployment tests.
# The deployment tests are available in the 'deployment' folder in the root of the project.

name: Test Deployment
run-name: "Test deployment for the  ${{ inputs.execution-environment }} environment"

on:
  workflow_call:
    inputs:
      execution-environment:
        description: "Environment"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      execution-environment:
        type: choice
        description: "Environment"
        required: true
        default: 'DEV'
        options:
        - DEV
        - PROD

jobs:
  deployment-tests:
    runs-on: ubuntu-20.04
    timeout-minutes: 5
    environment: ${{ inputs.execution-environment }}
    env:
      CANVAS_HOST: ${{ vars.CANVAS_HOST }}
      OAUTH_TOKEN: ${{ secrets.DEPLOYMENT_TESTS_OAUTH_TOKEN }}
      COURSE_ID: ${{ vars.COURSE_ID }}
      TOOL_ID: ${{ vars.TOOL_ID }}
      BACKEND_URL: ${{ vars.BACKEND_URL }}
    defaults:
      run:
        working-directory: deployment
    steps:
      - uses: actions/checkout@v4
      - name: Wait the backend to startup up and serve the index
        run: curl -I --show-error --silent --retry 10 --retry-connrefused --retry-delay 10 ${{ env.BACKEND_URL }}
      
        with:
          node-version-file: deployment/.nvmrc
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'
      - run: npm ci
      - run: npm run install-browsers
      - run: npm test

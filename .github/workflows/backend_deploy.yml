# This is to deploy a tagged version to production.

name: Backend PROD

env:
  AWS_REGION: "eu-west-1"
  # If AWS account/project changes this should too
  DOCKER_REPO: 211318693510.dkr.ecr.eu-west-1.amazonaws.com/ctl/calendar-import
  EB_APPLICATION: calendar-import
  EB_ENVIRONMENT: calendar-import-prod-env
  CANVAS_HOST: https://canvas.ox.ac.uk/
  OAUTH_TOKEN: ${{ secrets.OAUTH_TOKEN }}
  COURSE_ID: 186641
  TOOL_ID: 40183

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to deploy'
        required: true

jobs:
  deploy-prod:
    runs-on: ubuntu-20.04
    timeout-minutes: 20
    concurrency: prod
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.PROD_AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.PROD_AWS_SECRET_ACCESS_KEY }}
      TAG: ${{ github.event.inputs.tag }}
    steps:
      - name: Start deployment
        uses: bobheadxi/deployments@v1.4.0
        id: deployment
        with:
          step: start
          env: backend-prod
          desc: Production deploy of ${{ env.TAG }}
          ref: refs/tags/${{ env.TAG }}
      - name: Deploy to EB
        uses: einaregilsson/beanstalk-deploy@v21
        timeout-minutes: 15
        with:
          aws_access_key: ${{ secrets.PROD_AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.PROD_AWS_SECRET_ACCESS_KEY }}
          application_name: ${{ env.EB_APPLICATION }}
          environment_name: ${{ env.EB_ENVIRONMENT }}
          version_label: calendar-import.${{ env.TAG }}
          region: ${{ env.AWS_REGION }}
      - name: Save version in secrets manager
        run: aws secretsmanager update-secret --secret-id ${{ vars.VERSION_SECRET }} --secret-string calendar-import.${{ env.TAG }}
      - name: Update deployment status
        uses: bobheadxi/deployments@v1.4.0
        if: always()
        with:
          step: finish
          env: backend-prod
          status: ${{ job.status }}
          deployment_id: ${{ steps.deployment.outputs.deployment_id }}

  deployment-tests:
    runs-on: ubuntu-20.04
    timeout-minutes: 5
    needs: deploy-prod
    env:
      OAUTH_TOKEN: ${{ secrets.DEPLOYMENT_TESTS_OAUTH_TOKEN }}
    defaults:
      run:
        working-directory: deployment
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'
      - run: npm ci
      - run: npm run install-browsers
      - run: npm test

# This workflow makes a new GIT tag known as release and then triggers the release actions.

name: Release

on:
  workflow_dispatch:
    inputs:
      release-type:
        type: choice
        description: "Release Type"
        required: true
        default: 'Patch'
        options:
        - Major
        - Minor
        - Patch

jobs:
  perform-release:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    concurrency: release
    outputs:
      TAG_COMMIT_SHA: ${{ steps.set-commit-sha.outputs.TAG_COMMIT_SHA }}
      TAG_REF: ${{ steps.set-tags-ref.outputs.TAG_REF }}
    steps:
      # This makes a checkout of the source code
      - uses: actions/checkout@v4
        with:
          # This is needed so that we can find the latest tag which might not be the latest commit
          fetch-depth: 0
      # This setups the GIT to make pushes
      - name: Sets the author of the release
        run: |
          git config --global user.name "${GITHUB_ACTOR}"
          git config --global user.email "${GITHUB_ACTOR}@users.noreply.github.com"
      # Gets the latest tag and increments the release number# Gets the latest tag and increments the release number
      - name: Get the new release number
        run: echo "NEW_RELEASE_NUMBER=`${GITHUB_WORKSPACE}/increment_release.sh ${{ inputs.release-type }}`" >> $GITHUB_ENV
      # Setups NPM to build the frontend.
      - uses: actions/setup-node@v4
        with:
          node-version-file: 'frontend/.nvmrc'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'
      # Setups the JVM to build the backend.
      - uses: actions/setup-java@v4
        with:
          java-version-file: 'backend/.java-version'
          distribution: temurin
          cache: maven
      # Performs the release using the release.sh script.
      - name: Perform the release
        run: ${GITHUB_WORKSPACE}/release.sh ${{ env.NEW_RELEASE_NUMBER }}
      - name: Push the tags to the repository
        run: git push && git push --tags && git checkout ${{ env.NEW_RELEASE_NUMBER }}
      - id: set-commit-sha
        run: echo "TAG_COMMIT_SHA=`git rev-parse HEAD`" >> "$GITHUB_OUTPUT"
      - id: set-tags-ref
        run: echo "TAG_REF=refs/tags/${{ env.NEW_RELEASE_NUMBER }}" >> "$GITHUB_OUTPUT"

  call-frontend-pro:
    needs: [perform-release]
    uses: ./.github/workflows/frontend_pro.yml
    with:
      tag: ${{ needs.perform-release.outputs.TAG_REF }}
      sha: ${{ needs.perform-release.outputs.TAG_COMMIT_SHA }}
    secrets: inherit

  call-backend-pro:
    needs: [perform-release]
    uses: ./.github/workflows/backend_pro.yml
    with:
      tag: ${{ needs.perform-release.outputs.TAG_REF }}
      sha: ${{ needs.perform-release.outputs.TAG_COMMIT_SHA }}
    secrets: inherit

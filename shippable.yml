language: java
jdk:
  - openjdk11
branches:
  only:
    - master
build:
  cache: true
  cache_dir_list:
    - ~/.m2
  ci:
    - mvn install -DskipTests=true
    - mkdir -p shippable/testresults
    - mkdir -p shippable/codecoverage
    - mvn test
    - cp -r target/surefire-reports shippable/testresults
  post_ci:
    - if [ "$IS_PULL_REQUEST" != true ]; then mvn git-commit-id:revision jib:build; fi
    - if [ "$IS_PULL_REQUEST" != true ]; then shipctl post_resource_state_multi "canvas-calendar-import-image" "sourceName=211318693510.dkr.ecr.eu-west-1.amazonaws.com/ctl/calendar-import versionName=$BRANCH.$BUILD_NUMBER"; fi

integrations:
  hub:
    - integrationName: AWS
      region: eu-west-1
      type: ecr

resources:
  - name: canvas-calendar-import-image
    type: image
    integration: AWS
    versionTemplate:
      sourceName: "211318693510.dkr.ecr.eu-west-1.amazonaws.com/ctl/calendar-import"
      versionName: "latest"
  - name: canvas-calendar-import-config
    type: cliConfig
    integration: AWS
    pointer:
      region: eu-west-1
  - name: canvas-calendar-import-env-params
    type: params
    version:
      params:
        ENVIRONMENT: "calendar-import-dev"
        PORT: 8080
        AWS_EB_ENVIRONMENT: "calendar-import-dev"
        AWS_EB_APPLICATION: "calendar-import"
  - name: canvas-calendar-import-env-params-prod
    type: params
    version:
      params:
        AWS_EB_ENVIRONMENT: "calendar-import-2"

  - name: canvas-calendar-import-repo
    type: gitRepo
    integration: github
    pointer:
      sourceName: oxctl/canvas-calendar-import
      branch: master


jobs:
  - name: canvas-calendar-import_runCI
    type: runCI
    flags:
      - canvas-calendar-import
    steps:
      - OUT: canvas-calendar-import-image

  - name: canvas-calendar-import-deploy
    type: runSh
    steps:
      - IN: canvas-calendar-import-image
      - IN: canvas-calendar-import-config
        switch: off
      - IN: canvas-calendar-import-env-params
        switch: off
      - IN: canvas-calendar-import-repo
        switch: off
      - TASK:
          - script: aws elasticbeanstalk describe-applications
          - script: pushd $CANVASCALENDARIMPORTREPO_STATE/elasticbeanstalk && ls -al
          - script: export IMAGE="${CANVASCALENDARIMPORTIMAGE_SOURCENAME}:${CANVASCALENDARIMPORTIMAGE_VERSIONNAME}"
          - script: shippable_replace Dockerrun.aws.json .elasticbeanstalk/config.yml
          - script: eb deploy -v -l "shippable.canvas-calendar-import.${CANVASCALENDARIMPORTIMAGE_VERSIONNAME}" -m "${CANVASCALENDARIMPORTREPO_COMMIT_MESSAGE}"
          # Save the image that we are currently running
          - script: shipctl put_resource_state $JOB_NAME version "shippable.canvas-calendar-import.${CANVASCALENDARIMPORTIMAGE_VERSIONNAME}"

# This just takes the image that is currently on the dev instance and deploys it to the production environment
  - name: canvas-calendar-import-deploy-prod
    type: runSh
    steps:
      - IN: canvas-calendar-import-deploy
        switch: off
      - IN: canvas-calendar-import-config
        switch: off
      - IN: canvas-calendar-import-env-params
        switch: off
      - IN: canvas-calendar-import-env-params-prod
        switch: off
      - IN: canvas-calendar-import-repo
        switch: off
      - TASK:
          - script: aws elasticbeanstalk describe-applications
          - script: pushd $CANVASCALENDARIMPORTREPO_STATE/elasticbeanstalk && ls -al
          - script: shippable_replace .elasticbeanstalk/config.yml
          - script: version="$(shipctl get_resource_version_key canvas-calendar-import-deploy version)"
          - script: eb deploy -v -l "${version}"

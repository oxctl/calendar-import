language: java
jdk:
  - openjdk11
build:
  cache: true
  cache_dir_list:
    - ~/.m2
  ci:
    - mvn install -DskipTests=true
    - mkdir -p shippable/testresults
    - mkdir -p shippable/codecoverage
    - mvn test
    - cp -r target/surefire-reports shippable/testresults
  post_ci:
    - mvn git-commit-id:revision jib:build

integrations:
  hub:
    - integrationName: AWS
      region: eu-west-1
      type: ecr


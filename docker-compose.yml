version: '3'
services:
  app:
    # This is the image we build for production
    image: 075499702012.dkr.ecr.eu-west-1.amazonaws.com/acit/calendar-import:latest
    environment:
      JAVA_TOOL_OPTIONS: -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=localhost:5005
      MYSQL_USER: import
      MYSQL_PASSWORD: import
      MYSQL_DATABASE: import
    ports:
      - 8443:8443
      - 5005:5005
    volumes:
      # The working directory inside the container should be / and spring loads
      # config from the config folder relative to the current directory
      - ./docker-config:/config
  db:
    image: mysql:8.0.15
    ports:
      - 3306
    environment:
      MYSQL_ROOT_PASSWORD:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_USER: import
      MYSQL_PASSWORD: import
      MYSQL_DATABASE: import
    command:
     - --character-set-server=utf8

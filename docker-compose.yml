services:
  app:
    # This is the image we build for production
    image: 075499702012.dkr.ecr.eu-west-1.amazonaws.com/acit/calendar-import:latest
    volumes:
      - ./config:/config


  db:
    image: mysql:8.0.15
    environment:
      MYSQL_ROOT_PASSWORD:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_USER: import
      MYSQL_PASSWORD: import
      MYSQL_DATABASE: import
    command:
     - --character-set-server=utf8
